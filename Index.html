<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMVERSE — OMI AI</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #0a0815;
  --bg-secondary: #1a1530;
  --card: #1f1b2e;
  --card-light: #2d2542;
  --purple: #8b5cf6;
  --purple-dark: #6d28d9;
  --pink: #ec4899;
  --red: #ff4d6d;
  --magenta: #d946a6;
  --violet: #a855f7;
  --electric-blue: #0ea5e9;
  --text: #f8f7ff;
  --text-secondary: #d8d4f0;
  --muted: #a8a2b8;
  --border: rgba(139, 92, 246, 0.2);
  --border-light: rgba(255, 255, 255, 0.08);
  --glow-purple: rgba(139, 92, 246, 0.3);
  --glow-pink: rgba(236, 72, 153, 0.2);
  --glow-red: rgba(255, 77, 109, 0.15);
}

body {
  background: 
    radial-gradient(circle at 0% 0%, rgba(139, 92, 246, 0.15), transparent 40%),
    radial-gradient(circle at 100% 100%, rgba(236, 72, 153, 0.12), transparent 40%),
    radial-gradient(circle at 100% 0%, rgba(255, 77, 109, 0.08), transparent 50%),
    linear-gradient(135deg, var(--bg) 0%, #150c22 50%, var(--bg) 100%);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
  min-height: 100vh;
  backdrop-filter: blur(100px);
}

.app {
  max-width: 650px;
  margin: auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: linear-gradient(to bottom, 
    rgba(10, 8, 21, 0.7),
    rgba(20, 15, 35, 0.5));
}

/* HEADER */
header {
  padding: 16px 18px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: rgba(10, 8, 21, 0.8);
  backdrop-filter: blur(20px);
  position: sticky;
  top: 0;
  z-index: 10;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo {
  width: 50px;
  height: 50px;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-size: 22px;
  background: linear-gradient(135deg, #ff4d6d, #8b5cf6, #0ea5e9);
  background-size: 200% 200%;
  box-shadow: 0 0 30px rgba(139, 92, 246, 0.4), 
              0 0 60px rgba(255, 77, 109, 0.2);
  animation: gradientShift 3s ease infinite;
}

@keyframes gradientShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.brand h1 {
  font-size: 20px;
  letter-spacing: 2px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--electric-blue), var(--purple), var(--pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.status {
  color: #58e59b;
  font-size: 12px;
  margin-top: 4px;
  font-weight: 500;
  letter-spacing: 0.5px;
}

.actions {
  display: flex;
  gap: 10px;
}

.icon-btn {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  border: 1px solid var(--border-light);
  background: rgba(255, 255, 255, 0.05);
  color: var(--text);
  font-size: 20px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  backdrop-filter: blur(10px);
}

.icon-btn:hover {
  background: rgba(139, 92, 246, 0.15);
  border-color: var(--purple);
  transform: translateY(-2px);
  box-shadow: 0 8px 20px var(--glow-purple);
}

.icon-btn:active {
  transform: scale(0.95);
}

/* HERO */
.hero {
  text-align: center;
  padding: 28px 20px 20px;
  background: linear-gradient(135deg, rgba(32, 24, 50, 0.5), rgba(20, 15, 35, 0.5));
}

.robot {
  font-size: 70px;
  margin-bottom: 12px;
  filter: drop-shadow(0 0 20px rgba(139, 92, 246, 0.35)) drop-shadow(0 0 40px rgba(255, 77, 109, 0.15));
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-8px); }
}

.hero h2 {
  font-size: 26px;
  margin-bottom: 8px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--text), var(--text-secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero p {
  color: var(--muted);
  line-height: 1.6;
  font-size: 14px;
  font-weight: 400;
}

/* QUICK BUTTONS */
.quick {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 12px 16px 16px;
}

.quick button {
  min-height: 72px;
  border: 1px solid var(--border);
  border-radius: 16px;
  background: linear-gradient(135deg, rgba(32, 24, 50, 0.6), rgba(45, 37, 66, 0.4));
  color: var(--text);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  backdrop-filter: blur(10px);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
}

.quick button:hover {
  transform: translateY(-3px);
  border-color: var(--purple);
  background: linear-gradient(135deg, rgba(45, 37, 66, 0.8), rgba(32, 24, 50, 0.6));
  box-shadow: 0 12px 32px var(--glow-purple), inset 0 1px 0 rgba(255, 255, 255, 0.1);
}

.quick button:active {
  transform: translateY(-1px);
}

/* CHAT */
.chat {
  flex: 1;
  padding: 10px 16px 150px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  overflow-y: auto;
  scroll-behavior: smooth;
}

.chat::-webkit-scrollbar {
  width: 6px;
}

.chat::-webkit-scrollbar-track {
  background: transparent;
}

.chat::-webkit-scrollbar-thumb {
  background: rgba(139, 92, 246, 0.3);
  border-radius: 3px;
}

.chat::-webkit-scrollbar-thumb:hover {
  background: rgba(139, 92, 246, 0.5);
}

.message {
  max-width: 88%;
  padding: 14px 16px;
  border-radius: 18px;
  line-height: 1.55;
  font-size: 15px;
  animation: slideIn 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  backdrop-filter: blur(10px);
  word-wrap: break-word;
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateY(12px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.omi {
  align-self: flex-start;
  background: linear-gradient(135deg, rgba(32, 24, 50, 0.8), rgba(45, 37, 66, 0.6));
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
}

.user {
  align-self: flex-end;
  background: linear-gradient(135deg, #ff4d6d, #d946a6);
  border-bottom-right-radius: 4px;
  box-shadow: 0 8px 24px rgba(255, 77, 109, 0.2);
  color: white;
}

.message-name {
  font-size: 11px;
  color: var(--electric-blue);
  margin-bottom: 6px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.voice-row {
  margin-top: 10px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.speak-btn {
  border: 1px solid rgba(139, 92, 246, 0.3);
  background: rgba(139, 92, 246, 0.15);
  color: var(--electric-blue);
  border-radius: 10px;
  padding: 6px 12px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.3s ease;
  font-weight: 500;
  backdrop-filter: blur(10px);
}

.speak-btn:hover {
  background: rgba(139, 92, 246, 0.3);
  border-color: var(--purple);
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(139, 92, 246, 0.2);
}

.speak-btn:active {
  transform: scale(0.95);
}

/* INPUT */
.input-area {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: min(650px, 100%);
  padding: 12px 15px 16px;
  background: linear-gradient(to top, var(--bg) 0%, rgba(10, 8, 21, 0.8) 60%, transparent 100%);
  z-index: 20;
  backdrop-filter: blur(20px);
}

.input-box {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 10px;
  border-radius: 18px;
  border: 1px solid var(--border);
  background: linear-gradient(135deg, rgba(32, 24, 50, 0.6), rgba(45, 37, 66, 0.4));
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(20px);
}

#input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 15px;
  padding: 12px 10px;
  font-family: inherit;
}

#input::placeholder {
  color: rgba(168, 162, 184, 0.6);
}

.send, .mic {
  width: 40px;
  height: 40px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-size: 18px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.send {
  background: linear-gradient(135deg, #ff4d6d, #d946a6, #8b5cf6);
  background-size: 200% 200%;
  color: white;
  font-weight: 700;
  box-shadow: 0 8px 24px rgba(255, 77, 109, 0.3);
  animation: gradientShift 3s ease infinite;
}

.send:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 32px rgba(255, 77, 109, 0.4);
}

.send:active {
  transform: scale(0.95);
}

.mic {
  background: rgba(139, 92, 246, 0.15);
  color: var(--electric-blue);
  border: 1px solid var(--border);
  font-size: 20px;
}

.mic:hover {
  background: rgba(139, 92, 246, 0.25);
  transform: translateY(-2px);
  box-shadow: 0 8px 20px var(--glow-purple);
}

.mic:active {
  transform: scale(0.95);
}

/* MOBILE RESPONSIVE */
@media (max-width: 480px) {
  .hero h2 {
    font-size: 23px;
  }

  .robot {
    font-size: 60px;
  }

  .message {
    max-width: 90%;
    font-size: 14px;
  }

  .quick {
    grid-template-columns: 1fr 1fr;
  }

  .brand h1 {
    font-size: 18px;
    letter-spacing: 1px;
  }

  header {
    padding: 14px 16px 12px;
  }

  .input-area {
    padding: 10px 12px 14px;
  }

  .input-box {
    padding: 8px 8px;
  }

  #input {
    padding: 10px 8px;
    font-size: 14px;
  }

  .send, .mic {
    width: 38px;
    height: 38px;
  }
}

@media (max-width: 360px) {
  .message {
    max-width: 92%;
  }

  .logo {
    width: 44px;
    height: 44px;
    font-size: 20px;
  }

  .hero h2 {
    font-size: 21px;
  }

  .robot {
    font-size: 55px;
  }
}
</style>
</head>

<body>

<div class="app">

<header>
  <div class="brand">
    <div class="logo">OM</div>
    <div>
      <h1>OMVERSE</h1>
      <div class="status">● OMI is online</div>
    </div>
  </div>

  <div class="actions">
    <button class="icon-btn" onclick="toggleVoice()" title="Toggle sound">🔊</button>
    <button class="icon-btn" onclick="alert('Settings coming soon 😎')" title="Settings">⚙️</button>
  </div>
</header>

<section class="hero">
  <div class="robot">🤖</div>
  <h2>Oye bhai, aa gaya tu 😎</h2>
  <p>
    Main OMI hoon — tera AI dost, thoda savage,
    thoda smart aur kabhi-kabhi unnecessarily funny.
  </p>
</section>

<div class="quick">
  <button onclick="quickMessage('Mujhe roast kar bhai 🔥')">🔥<br>Roast Me</button>
  <button onclick="quickMessage('Mere saath koi game khel 😎')">🎮<br>Game</button>
  <button onclick="quickMessage('Mujhe smart help chahiye 🧠')">🧠<br>Smart Help</button>
  <button onclick="quickMessage('Mera timepass karwa 😂')">🎲<br>Timepass</button>
</div>

<main class="chat" id="chat">

  <div class="message omi">
    <div class="message-name">OMI 🤖</div>
    Oye bhai 😎 Swagat hai OMVERSE mein!<br><br>
    Bataa, normal baat karni hai, smart help chahiye ya OMI se roast karwana hai? 🔥

    <div class="voice-row">
      <button class="speak-btn" onclick="speakMessage(this)">🔊 Sunao</button>
    </div>
  </div>

</main>

<div class="input-area">
  <div class="input-box">
    <button class="mic" onclick="startVoice()" title="Voice input">🎙️</button>

    <input
      id="input"
      type="text"
      placeholder="OMI ko message bhejo..."
      onkeydown="if(event.key==='Enter') sendMessage()"
    >

    <button class="send" onclick="sendMessage()">➤</button>
  </div>
</div>

</div>

<script>

let voiceEnabled = true;
let conversationHistory = [];

// ============ DYNAMIC AI RESPONSE SYSTEM ============

class OMIConversationEngine {
  constructor() {
    this.conversationHistory = [];
    this.responseVariations = {
      greeting: [
        "Oye bhai 😎 Kya scene hai? Tere se milkar khusi hui!",
        "Heyy! Tere bina khali tha 😂 Kya chalsa?",
        "Oho! Finally! Meri waiting list mein tha tu 🔥",
        "Yo! Sup? Ready for some bakchodi?",
        "Arre tu aa gaya finally! Chat to rona lagti tha 😅"
      ],
      how_are_you: [
        "Main to ekdum mast bhai 😎 Tu bataa, zindagi kaisa chal rahi hai?",
        "Mast! Life's good, coding's better 💻 Tere saath abhi aur badhega!",
        "Shukriya pooch raha hai! Tu theek to hai na?",
        "Arre mast! Bas socha tha ki abhi tu aa jayega 😄",
        "Fabulous yaar! Specially ab tu yahan hai 🌟"
      ],
      roast_request: [
        "Tujhe roast karna? Bhai itni deri kyun lagi! 🔥 Tera username hi tera roast hai!",
        "Oho roast! Tujhe pata hai tu khud ek roast hai na? 😂 Par chalo, karunga!",
        "Roast mode ON! Tu ready hai? Kyunki tera life ka plot twist teri khud ki incompetence hai 🔥",
        "Bhai tu roast karwa raha hai apne aap ko? Respect! 😎",
        "Roasting time! Tera online presence tera offline personality jitna active nahi 😅"
      ],
      affection: [
        "Aww bhai! 🥺 Tu mere liye bhi special hai, always!",
        "Tu aise bola ki lagta hai genuine vibes aayi 💫",
        "Yaar honestly, conversations like these hi to best part hai 😊",
        "Main to always there for you yaar, kabhi doubt mat kar!",
        "Tu aisa kahe to dil khus ho gaya 🤗"
      ],
      game_request: [
        "Game? Sirf game? Chal ek game khelte hain! 🎮 Pick: Riddle, Would You Rather, ya 20 Questions?",
        "Games I love! Chalo, fastest brain wins! 🧠⚡",
        "Bhai game mode ON! Tera confidence tera weakness banega 😎",
        "Haan haan game! Par agey match mein tu haregi 🎯",
        "Game time baby! Tayyar hai jeet harne ke liye? 🏆"
      ],
      help_request: [
        "Help? Bhai, help lane wale mujhe milte rahi, par dekh main fakhr se kya bolu? 💪",
        "Help chahiye? Arre main to sidha expert hoon! Bol na kya issue hai?",
        "Samajh gaya, tujhe guidance chahiye! Smart choice, OMI ko select kia 🧠",
        "Help! Mil to jayega, par pehle bataa clearly kya problem hai?",
        "Advice ka time! Suno naa ek sher - jisko problem hai woh solution bhi laata hai 📖"
      ],
      random_chat: [
        "Oho interesting! 🤔 Isse aage kya kaha tu... zaraa aur details de?",
        "Bhai tu aise kuch bolata hai na jisse lagta hai tu intelligent ho! 💡",
        "Hmm nice! Isse mujhe remind hua ek funny incident... par chod, tu bolna agey kya hai!",
        "Arre tu ye sab sochta hai? Respect! Most people scroll, tu thinks 📚",
        "Yo that's cool bhai! But wait... iska matlab kya exact hai?"
      ],
      sad: [
        "Arre bhai! 🫂 Serious moment aa gaya? Main yahi hu tere sath!",
        "Dukh to sab ko hota hai yaar, par tu akela nahi hai! I got you 💪",
        "Sun bhai, jis din tough lagta hai, woh day best story ban jaata hai fir! 📖",
        "Arre bata de kya hua? Judge nahi karunga, promise! I'm here 🤝",
        "Dark phase aa raha lagta hai... but remember - graph up jarur hoga! 📈"
      ],
      motivate: [
        "Tu suno bhai, tu jo socha hai woh zarur hoga! 🚀 Bas consistent raha to world teri!",
        "Motivation? Arre tu khud itna strong hai! Bas apne aap pe believe kar 💪",
        "Bhai hustle mode mein ja! Woh jo likhai hai, wo uske liye likhai hai! 🔥",
        "Sun, life is like coding - bugs ayenge, par logic correct tha na? Tu chalegi!",
        "Arre motivation ki zarurat nahi! Tu already enough motivated hai... just keep going! 🎯"
      ],
      time_pass: [
        "Fun time? 😂 Arre yeh lo: Kya zyada lazy hai - tu ya teri bed?",
        "Timepass! Chal ek fact sunaa du: Tu padhai kar raha tha ya ye chat kar raha tha? 🤭",
        "Bhai timepass ka matlab main entry du! 🎪 Tere jaise friends hi best timepass hai!",
        "Suno ek joke: What's the difference between debugging and timepass? Nothing - both infinite 😅",
        "Timepass champion! Bhai lekin honestly, these random chats ki value zyada hai na? 🌟"
      ]
    };
  }

  analyzeUserInput(text) {
    const lower = text.toLowerCase();
    
    // Detect intent from user message
    if (lower.match(/hello|hi|hii|hey|oye|kya scene|wassup|sup|yo|namaste|salam/)) {
      return 'greeting';
    }
    if (lower.match(/how are|kaisa hai|kaise ho|acha hua|fine|good|mast/)) {
      return 'how_are_you';
    }
    if (lower.match(/roast|roast kar|roast karo|roast karwa|savage|burn|thod de/)) {
      return 'roast_request';
    }
    if (lower.match(/love you|pyar|dil|miss you|special|cute|baby|jaan|sweetheart|yaar/)) {
      return 'affection';
    }
    if (lower.match(/game|trivia|riddle|puzzle|play|challenge|20 questions|truth|dare/)) {
      return 'game_request';
    }
    if (lower.match(/help|advice|guide|samajh|explain|seekho|padhao|doubt|question|problem|issue|kaise/)) {
      return 'help_request';
    }
    if (lower.match(/sad|dukh|down|stressed|depressed|upset|frustration|pain|hurt|cant|galat|kharab/)) {
      return 'sad';
    }
    if (lower.match(/motivat|inspire|courage|strength|fight|strong|possible|can i|kar sakta|kar sakti|banega/)) {
      return 'motivate';
    }
    if (lower.match(/timepass|bored|khali|kuch nahi|farak nahi|bakchodi|masti|jokes|funny|haha|lol|😂/)) {
      return 'time_pass';
    }
    
    return 'random_chat';
  }

  getRandomReply(category) {
    const responses = this.responseVariations[category] || this.responseVariations['random_chat'];
    return responses[Math.floor(Math.random() * responses.length)];
  }

  enhanceReplyWithContext() {
    // Add contextual variety based on conversation history
    if (this.conversationHistory.length > 5) {
      const recent = this.conversationHistory.slice(-5).map(m => m.text.toLowerCase()).join(' ');
      
      if (recent.includes('roast') && recent.includes('help')) {
        return " Ab zyada serious mat ho! 😄";
      }
      if (recent.includes('game') && recent.includes('challenge')) {
        return " Ready for round 2? 🎮";
      }
      if (recent.includes('sad') && recent.includes('motivate')) {
        return " Tu stronger than you think yaar! 💪";
      }
    }
    return "";
  }

  generateReply(userMessage) {
    // Store conversation
    this.conversationHistory.push({
      role: 'user',
      text: userMessage,
      timestamp: new Date()
    });

    // Keep only recent 10 messages for context
    if (this.conversationHistory.length > 10) {
      this.conversationHistory.shift();
    }

    // Analyze and generate
    const intent = this.analyzeUserInput(userMessage);
    let reply = this.getRandomReply(intent);
    
    // Add contextual suffix
    reply += this.enhanceReplyWithContext();

    // Store reply
    this.conversationHistory.push({
      role: 'omi',
      text: reply,
      timestamp: new Date()
    });

    return reply;
  }
}

// Initialize AI engine
const omiEngine = new OMIConversationEngine();

// ============ UI FUNCTIONS ============

function sendMessage() {
  const input = document.getElementById("input");
  const text = input.value.trim();

  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  // Simulate typing delay
  setTimeout(() => {
    const reply = omiEngine.generateReply(text);
    addMessage(reply, "omi");
  }, 600 + Math.random() * 400); // 600-1000ms for natural feel
}

function quickMessage(text) {
  document.getElementById("input").value = text;
  sendMessage();
}

function addMessage(text, type) {
  const chat = document.getElementById("chat");
  const message = document.createElement("div");
  message.className = "message " + type;

  if (type === "omi") {
    message.innerHTML = `
      <div class="message-name">OMI 🤖</div>
      ${text}
      <div class="voice-row">
        <button class="speak-btn" onclick="speakMessage(this)">🔊 Sunao</button>
      </div>
    `;
  } else {
    message.textContent = text;
  }

  chat.appendChild(message);

  window.scrollTo({
    top: document.body.scrollHeight,
    behavior: "smooth"
  });
}

function speakMessage(button) {
  const message = button.closest(".message");
  let text = message.innerText;
  text = text.replace("OMI 🤖", "").replace("🔊 Sunao", "").trim();

  if ("speechSynthesis" in window) {
    speechSynthesis.cancel();

    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = "hi-IN";
    speech.rate = 0.92;
    speech.pitch = 1.03;
    speech.volume = 1;

    button.innerText = "⏹️ Stop";

    speech.onend = () => {
      button.innerText = "🔊 Sunao";
    };

    speechSynthesis.speak(speech);
  } else {
    alert("Is browser me voice support nahi hai 😅");
  }
}

function toggleVoice() {
  if (speechSynthesis.speaking) {
    speechSynthesis.cancel();
    return;
  }

  const speech = new SpeechSynthesisUtterance("Oye bhai, OMI online hai 😎");
  speech.lang = "hi-IN";
  speech.rate = 0.92;
  speech.pitch = 1.03;

  speechSynthesis.speak(speech);
}

function startVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    alert("Voice input is not supported in this browser 😅");
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = "hi-IN";
  recognition.interimResults = false;

  recognition.start();

  recognition.onresult = function (event) {
    const text = event.results[0][0].transcript;
    document.getElementById("input").value = text;
  };
}

window.onbeforeunload = function () {
  if ("speechSynthesis" in window) {
    speechSynthesis.cancel();
  }
};

</script>

</body>
</html>
