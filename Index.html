<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMVERSE — OMI AI</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

:root{
  --bg:#09090d;
  --card:#15151d;
  --card2:#1d1d27;
  --red:#ff4657;
  --purple:#8b5cf6;
  --white:#ffffff;
  --muted:#a7a7b4;
  --border:rgba(255,255,255,.1);
}

html,
body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:var(--bg);
  color:var(--white);
  font-family:Arial,Helvetica,sans-serif;
}

body{
  background:
  radial-gradient(circle at 100% 0%,rgba(139,92,246,.2),transparent 35%),
  radial-gradient(circle at 0% 100%,rgba(255,70,87,.12),transparent 35%),
  var(--bg);
}

.app{
  width:100%;
  max-width:650px;
  height:100dvh;
  margin:auto;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* HEADER */

.header{
  flex:0 0 72px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 16px;
  background:rgba(9,9,13,.94);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(20px);
  z-index:10;
}

.brand{
  display:flex;
  align-items:center;
  gap:11px;
}

.logo{
  width:44px;
  height:44px;
  border-radius:14px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:900;
  font-size:17px;
  background:linear-gradient(135deg,var(--red),var(--purple));
  box-shadow:0 0 25px rgba(139,92,246,.35);
}

.brand-title{
  font-weight:800;
  letter-spacing:1px;
  font-size:18px;
}

.online{
  margin-top:3px;
  color:#65e6a2;
  font-size:11px;
}

.online-dot{
  display:inline-block;
  width:7px;
  height:7px;
  margin-right:5px;
  border-radius:50%;
  background:#65e6a2;
  box-shadow:0 0 9px #65e6a2;
}

.actions{
  display:flex;
  gap:8px;
}

.icon{
  width:42px;
  height:42px;
  border:1px solid var(--border);
  border-radius:14px;
  background:var(--card2);
  color:white;
  font-size:18px;
  cursor:pointer;
}

/* CHAT AREA */

.chat{
  flex:1 1 auto;
  min-height:0;
  overflow-y:auto;
  padding:20px 15px 15px;
  scroll-behavior:smooth;
}

.chat::-webkit-scrollbar{
  width:4px;
}

.chat::-webkit-scrollbar-thumb{
  background:#343440;
  border-radius:20px;
}

.welcome{
  text-align:center;
  padding:15px 10px 25px;
}

.robot{
  font-size:64px;
  animation:float 3s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
}

.welcome h2{
  font-size:24px;
  margin-top:10px;
}

.welcome p{
  margin:8px auto 0;
  max-width:420px;
  color:var(--muted);
  font-size:14px;
  line-height:1.5;
}

/* MESSAGES */

.message{
  display:flex;
  width:100%;
  margin:15px 0;
  animation:show .25s ease;
}

@keyframes show{
  from{
    opacity:0;
    transform:translateY(8px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.message.user{
  justify-content:flex-end;
}

.message-content{
  max-width:84%;
}

.bubble{
  padding:13px 15px;
  border-radius:18px;
  font-size:15px;
  line-height:1.5;
  white-space:pre-wrap;
  word-break:break-word;
}

.message.omi .bubble{
  background:linear-gradient(135deg,#24183f,#171322);
  border:1px solid rgba(139,92,246,.35);
  border-bottom-left-radius:5px;
}

.message.user .bubble{
  background:linear-gradient(135deg,#c93749,#8c2737);
  border-bottom-right-radius:5px;
}

.label{
  margin:5px 6px 0;
  font-size:10px;
  color:var(--muted);
}

.message.user .label{
  text-align:right;
}

/* TYPING */

.typing{
  display:flex;
  gap:5px;
  width:max-content;
  padding:15px 17px;
  border-radius:18px;
  border-bottom-left-radius:5px;
  background:#24183f;
  border:1px solid rgba(139,92,246,.35);
}

.typing span{
  width:6px;
  height:6px;
  border-radius:50%;
  background:#c2aeff;
  animation:typing 1s infinite;
}

.typing span:nth-child(2){
  animation-delay:.15s;
}

.typing span:nth-child(3){
  animation-delay:.3s;
}

@keyframes typing{
  0%,100%{
    opacity:.4;
    transform:translateY(0);
  }
  50%{
    opacity:1;
    transform:translateY(-5px);
  }
}

/* BOTTOM AREA */

.bottom{
  flex:0 0 auto;
  padding:8px 13px 14px;
  background:linear-gradient(
    transparent,
    rgba(9,9,13,.98) 20%
  );
}

/* QUICK ACTIONS */

.quick{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:5px 0 10px;
}

.quick::-webkit-scrollbar{
  display:none;
}

.quick button{
  flex:0 0 auto;
  border:1px solid var(--border);
  border-radius:13px;
  background:var(--card2);
  color:white;
  padding:9px 12px;
  font-size:12px;
  cursor:pointer;
}

.quick button:active{
  transform:scale(.95);
}

/* MESSAGE BOX */

.composer{
  width:100%;
  min-height:58px;
  display:flex;
  align-items:flex-end;
  gap:7px;
  padding:7px;
  border-radius:20px;
  background:#171720;
  border:1px solid rgba(255,255,255,.13
