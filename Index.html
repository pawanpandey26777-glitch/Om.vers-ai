<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>OMVERSE: NEON CITY</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  user-select:none;
}

body{
  overflow:hidden;
  background:#050509;
  font-family:Arial,sans-serif;
}

#game{
  position:fixed;
  inset:0;
}

canvas{
  display:block;
}

/* HUD */

#hud{
  position:fixed;
  inset:0;
  pointer-events:none;
  color:white;
}

.topbar{
  display:flex;
  justify-content:space-between;
  padding:18px;
}

.panel{
  padding:12px 16px;
  border:1px solid rgba(255,255,255,.2);
  border-radius:16px;
  background:rgba(10,8,20,.65);
  backdrop-filter:blur(12px);
  box-shadow:0 0 20px rgba(130,60,255,.2);
}

.title{
  font-size:18px;
  font-weight:bold;
  letter-spacing:2px;
}

.stats{
  margin-top:6px;
  font-size:13px;
  color:#aaa;
}

#mission{
  position:fixed;
  top:90px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 18px;
  border-radius:15px;
  background:rgba(10,8,20,.7);
  border:1px solid #8e52ff;
  color:#fff;
  text-align:center;
  box-shadow:0 0 25px #8e52ff44;
}

/* CROSSHAIR */

#crosshair{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:25px;
  height:25px;
  border:2px solid rgba(255,255,255,.7);
  border-radius:50%;
}

/* MOBILE CONTROLS */

#controls{
  position:fixed;
  inset:0;
  pointer-events:none;
}

#joystick{
  position:absolute;
  bottom:35px;
  left:28px;
  width:125px;
  height:125px;
  border-radius:50%;
  background:rgba(255,255,255,.08);
  border:2px solid rgba(255,255,255,.2);
  pointer-events:auto;
}

#stick{
  position:absolute;
  width:55px;
