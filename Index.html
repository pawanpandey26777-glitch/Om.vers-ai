<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMVERSE — OMI AI</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

:root{
  --red:#ff4d5a;
  --pink:#ff4f87;
  --purple:#8d5cff;
  --bg:#08070d;
  --card:#15121f;
  --text:#ffffff;
  --muted:#aaa5b5;
}

body{
  min-height:100vh;
  background:
    radial-gradient(circle at 20% 20%,#21113d 0%,transparent 35%),
    radial-gradient(circle at 90% 80%,#301016 0%,transparent 35%),
    var(--bg);
  color:var(--text);
  font-family:Arial,Helvetica,sans-serif;
  overflow:hidden;
}

/* APP */
.app{
  height:100vh;
  max-width:650px;
  margin:auto;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header{
  height:82px;
  padding:14px 18px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid #282431;
  background:rgba(8,7,13,.88);
  backdrop-filter:blur(15px);
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo{
  width:54px;
  height:54px;
  border-radius:18px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:23px;
  font-weight:900;
  background:linear-gradient(135deg,#ff4d70,#8c4dff);
  box-shadow:0 0 25px #9b3fff55;
}

.brand h1{
  font-size:22px;
  letter-spacing:1px;
}

.status{
  color:#52e29b;
  font-size:14px;
  margin-top:4px;
}

.header-buttons{
  display:flex;
  gap:10px;
}

.icon-btn{
  width:48px;
  height:48px;
  border:none;
  border-radius:50%;
  background:#1b1922;
  color:white;
  font-size:21px;
  cursor:pointer;
  transition:.2s;
}

.icon-btn:hover{
  transform:scale(1.08);
  background:#292432;
}

/* CHAT */
.chat{
  flex:1;
  overflow-y:auto;
  padding:20px 16px 145px;
  scroll-behavior:smooth;
}

.welcome{
  text-align:center;
  padding:28px 10px 24px;
}

.robot{
  font-size:75px;
  margin-bottom:12px;
  filter:drop-shadow(0 0 20px #884dff88);
}

.welcome h2{
  font-size:27px;
  margin-bottom:10px;
}

.welcome p{
  color:var(--muted);
  line-height:1.6;
  font-size:15px;
}

/* MESSAGES */
.message{
  display:flex;
  margin:16px 0;
  animation:appear .25s ease;
}

@keyframes appear{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.message.user{
  justify-content:flex-end;
}

.bubble{
  max-width:82%;
  padding:14px 17px;
  border-radius:20px;
  line-height:1.5;
  font-size:16px;
  white-space:pre-wrap;
}

.ai .bubble{
  background:linear-gradient(135deg,#1b1530,#24163d);
  border:1px solid #6841a877;
  border-bottom-left-radius:5px;
  box-shadow:0 5px 25px #00000035;
}

.user .bubble{
  background:linear-gradient(135deg,#ff4058,#b52c72);
  border-bottom-right-radius:5px;
  box-shadow:0 5px 20px #ff365833;
}

/* QUICK BUTTONS */
.quick{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:8px 0 14px;
}

.quick button{
  white-space:nowrap;
  border:1px solid #514066;
  background:#171321;
  color:#ddd;
  border-radius:20px;
  padding:10px 14px;
  cursor:pointer;
}

.quick button:hover{
  border-color:var(--pink);
}

/* INPUT AREA */
.input-area{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:650px;
  padding:12px 14px 18px;
  background:linear-gradient(transparent,#08070d 25%);
}

.input-box{
  display:flex;
  align-items:flex-end;
  gap:8px;
  padding:9px;
  border:1px solid #3a3347;
  background:#15121e;
  border-radius:25px;
  box-shadow:0 0 25px #00000066;
}

#messageInput{
  flex:1;
  resize:none;
  min-height:42px;
  max-height:120px;
  padding:11px 10px;
  border:none;
  outline:none;
  color:white;
  background:transparent;
  font-size:16px;
  font-family:inherit;
}

#messageInput::placeholder{
  color:#898392;
}

.send-btn,
.mic-btn{
  width:45px;
  height:45px;
  border:none;
  border-radius:50%;
  cursor:pointer;
  color:white;
  font-size:19px;
  flex-shrink:0;
}

.send-btn{
  background:linear-gradient(135deg,#ff4058,#8e45ff);
}

.mic-btn{
  background:#292332;
}

.send-btn:active,
.mic-btn:active{
  transform:scale(.9);
}

/* TYPING */
.typing{
  display:none;
  color:#aaa;
  font-size:14px;
  margin:10px 4px;
}

.typing span{
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:.2}
}

/* MOBILE */
@media(max-width:500px){
  .brand h1{
    font-size:19px;
  }

  .logo{
    width:48px;
    height:48px;
  }

  .welcome h2{
    font-size:24px;
  }

  .bubble{
    max-width:88%;
  }
}
</style>
</head>

<body>

<div class="app">

  <!-- HEADER -->
  <header class="header">
    <div class="brand">
      <div class="logo">OM</div>
      <div>
        <h1>OMVERSE</h1>
        <div class="status">● OMI is online</div>
      </div>
    </div>

    <div class="header-buttons">
      <button class="icon-btn" onclick="toggleVoice()" id="voiceToggle">🔊</button>
      <button class="icon-btn" onclick="showSettings()">⚙️</button>
    </div>
  </header>

  <!-- CHAT -->
  <main class="chat" id="chat">

    <section class="welcome">
      <div class="robot">🤖</div>
      <h2>Oye bhai, aa gaya tu 😎</h2>
      <p>
        Main OMI hoon — tera AI dost, thoda savage,
        thoda smart aur kabhi-kabhi unnecessarily funny.
      </p>
    </section>

    <div class="message ai">
      <div class="bubble">
Oye bhai 😎 Swagat hai OMVERSE mein!

Bata, normal baat karni hai, smart help chahiye ya OMI se roast karwana hai? 🔥
      </div>
    </div>

    <div class="quick">
      <button onclick="quickMessage('Mujhe roast karo 🔥')">🔥 Roast Me</button>
      <button onclick="quickMessage('Mujhe smart help chahiye 🧠')">🧠 Smart Help</button>
      <button onclick="quickMessage('Mere saath game khelo 🎮')">🎮 Game</button>
      <button onclick="quickMessage('Mujhe motivate karo 💪')">💪 Motivation</button>
    </div>

    <div class="typing" id="typing">
      OMI is typing<span>...</span>
    </div>

  </main>

  <!-- INPUT -->
  <div class="input-area">
    <div class="input-box">

      <button class="mic-btn" onclick="startVoice()" title="Voice">
        🎙️
      </button>

      <textarea
        id="messageInput"
        placeholder="OMI ko kuch bol bhai..."
        rows="1"
        onkeydown="handleKey(event)"
      ></textarea>

      <button class="send-btn" onclick="sendMessage()">
        ➤
      </button>

    </div>
  </div>

</div>

<script>

let voiceEnabled = true;
let selectedMode = "normal";

const input = document.getElementById("messageInput");
const chat = document.getElementById("chat");
const typing = document.getElementById("typing");

function addMessage(text,type){

  const message = document.createElement("div");
  message.className = "message " + type;

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = text;

  message.appendChild(bubble);
  chat.insertBefore(message,typing);

  chat.scrollTop = chat.scrollHeight;
}

function sendMessage(){

  const text = input.value.trim();

  if(!text) return;

  addMessage(text,"user");

  input.value = "";
  input.style.height = "42px";

  typing.style.display = "block";
  chat.scrollTop = chat.scrollHeight;

  setTimeout(()=>{
    typing.style.display = "none";

    const reply = generateReply(text);

    addMessage(reply,"ai");

    if(voiceEnabled){
      speak(reply);
    }

  },700);
}

function quickMessage(text){
  input.value = text;
  sendMessage();
}

function handleKey(event){

  if(event.key === "Enter" && !event.shiftKey){
    event.preventDefault();
    sendMessage();
  }
}

input.addEventListener("input",function(){

  this.style.height = "42px";
  this.style.height = this.scrollHeight + "px";

});

function generateReply(text){

  const msg = text.toLowerCase();

  if(msg.includes("roast")){
    return "Bhai tera confidence dekh ke lagta hai WiFi signal bhi tujhe dekh ke strong ho jata hai 😂🔥";
  }

  if(msg.includes("haal") || msg.includes("kaise ho") || msg.includes("kya haal")){
    return "Main ekdum mast bhai 😎 Tu bata, life chal rahi hai ya life tujhe chala rahi hai? 😂";
  }

  if(msg.includes("hello") || msg.includes("hi") || msg.includes("hii")){
    return "Oye bhai 😎 Kya scene hai? OMI online hai, bol kya bakchodi karni hai?";
  }

  if(msg.includes("sad") || msg.includes("dukhi")){
    return "Bhai tension mat le. Problem badi ho sakti hai, par tu akela nahi hai. Bata kya hua?";
  }

  if(msg.includes("motivate") || msg.includes("motivation")){
    return "Bhai motivation ka wait mat kar. Pehle action le, motivation raste mein mil jayegi 💪🔥";
  }

  if(msg.includes("game")){
    return "Chal game khelte hain 🎮 Main tujhe ek challenge deta hoon: 5 second mein apne baare mein ek funny fact bol 😂";
  }

  if(msg.includes("help")){
    return "Bol bhai, kis cheez mein help chahiye? Study, coding, life, ideas ya koi aur lafda? 😎";
  }

  return "Hmmm... interesting bhai 👀 Ispe thoda sochna padega. Tu thoda aur detail mein bata, OMI full attention se sun raha hai 😎";
}

/* VOICE OUTPUT */
function speak(text){

  if(!("speechSynthesis" in window)) return;

  window.speechSynthesis.cancel();

  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "hi-IN";
  speech.rate = 1.05;
  speech.pitch = 1;

  window.speechSynthesis.speak(speech);
}

function toggleVoice(){

  voiceEnabled = !voiceEnabled;

  document.getElementById("voiceToggle").textContent =
    voiceEnabled ? "🔊" : "🔇";
}

/* VOICE INPUT */
function startVoice(){

  const SpeechRecognition =
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;

  if(!SpeechRecognition){

    alert("Bhai, is browser mein voice recognition support nahi hai 😭");
    return;
  }

  const recognition = new SpeechRecognition();

  recognition.lang = "hi-IN";
  recognition.interimResults = false;

  recognition.start();

  recognition.onresult = function(event){

    const result = event.results[0][0].transcript;

    input.value = result;
    sendMessage();

  };

  recognition.onerror = function(){

    alert("Voice input start nahi ho paya. Mic permission check kar bhai 🎙️");
  };
}

function showSettings(){

  alert(
`OMVERSE SETTINGS

🔊 Voice: ${voiceEnabled ? "ON" : "OFF"}

OMI is ready to roast you 😎🔥`
  );

}

</script>

</body>
  </html>
