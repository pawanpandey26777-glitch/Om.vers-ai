<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMVERSE — OMI AI</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #0a0815;
  --bg-secondary: #1a1530;
  --card: #1f1b2e;
  --card-light: #2d2542;
  --purple: #8b5cf6;
  --purple-dark: #6d28d9;
  --pink: #ec4899;
  --red: #ff4d6d;
  --magenta: #d946a6;
  --violet: #a855f7;
  --electric-blue: #0ea5e9;
  --text: #f8f7ff;
  --text-secondary: #d8d4f0;
  --muted: #a8a2b8;
  --border: rgba(139, 92, 246, 0.2);
  --border-light: rgba(255, 255, 255, 0.08);
  --glow-purple: rgba(139, 92, 246, 0.3);
  --glow-pink: rgba(236, 72, 153, 0.2);
  --glow-red: rgba(255, 77, 109, 0.15);
}

body {
  background: 
    radial-gradient(circle at 0% 0%, rgba(139, 92, 246, 0.15), transparent 40%),
    radial-gradient(circle at 100% 100%, rgba(236, 72, 153, 0.12), transparent 40%),
    radial-gradient(circle at 100% 0%, rgba(255, 77, 109, 0.08), transparent 50%),
    linear-gradient(135deg, var(--bg) 0%, #150c22 50%, var(--bg) 100%);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
  min-height: 100vh;
  backdrop-filter: blur(100px);
}

.app {
  max-width: 650px;
  margin: auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: linear-gradient(to bottom, 
    rgba(10, 8, 21, 0.7),
    rgba(20, 15, 35, 0.5));
}

/* HEADER */
header {
  padding: 16px 18px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: rgba(10, 8, 21, 0.8);
  backdrop-filter: blur(20px);
  position: sticky;
  top: 0;
  z-index: 10;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo {
  width: 50px;
  height: 50px;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-size: 22px;
  background: linear-gradient(135deg, #ff4d6d, #8b5cf6, #0ea5e9);
  background-size: 200% 200%;
  box-shadow: 0 0 30px rgba(139, 92, 246, 0.4), 
              0 0 60px rgba(255, 77, 109, 0.2);
  animation: gradientShift 3s ease infinite;
}

@keyframes gradientShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.brand h1 {
  font-size: 20px;
  letter-spacing: 2px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--electric-blue), var(--purple), var(--pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.status {
  color: #58e59b;
  font-size: 12px;
  margin-top: 4px;
  font-weight: 500;
  letter-spacing: 0.5px;
}

.actions {
  display: flex;
  gap: 10px;
}

.icon-btn {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  border: 1px solid var(--border-light);
  background: rgba(255, 255, 255, 0.05);
  color: var(--text);
  font-size: 20px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  backdrop-filter: blur(10px);
}

.icon-btn:hover {
  background: rgba(139, 92, 246, 0.15);
  border-color: var(--purple);
  transform: translateY(-2px);
  box-shadow: 0 8px 20px var(--glow-purple);
}

.icon-btn:active {
  transform: scale(0.95);
}

/* HERO */
.hero {
  text-align: center;
  padding: 28px 20px 20px;
  background: linear-gradient(135deg, rgba(32, 24, 50, 0.5), rgba(20, 15, 35, 0.5));
}

.robot {
  font-size: 70px;
  margin-bottom: 12px;
  filter: drop-shadow(0 0 20px rgba(139, 92, 246, 0.35)) drop-shadow(0 0 40px rgba(255, 77, 109, 0.15));
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-8px); }
}

.hero h2 {
  font-size: 26px;
  margin-bottom: 8px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--text), var(--text-secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero p {
  color: var(--muted);
  line-height: 1.6;
  font-size: 14px;
  font-weight: 400;
}

/* QUICK BUTTONS */
.quick {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 12px 16px 16px;
}

.quick button {
  min-height: 72px;
  border: 1px solid var(--border);
  border-radius: 16px;
  background: linear-gradient(135deg, rgba(32, 24, 50, 0.6), rgba(45, 37, 66, 0.4));
  color: var(--text);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  backdrop-filter: blur(10px);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
}

.quick button:hover {
  transform: translateY(-3px);
  border-color: var(--purple);
  background: linear-gradient(135deg, rgba(45, 37, 66, 0.8), rgba(32, 24, 50, 0.6));
  box-shadow: 0 12px 32px var(--glow-purple), inset 0 1px 0 rgba(255, 255, 255, 0.1);
}

.quick button:active {
  transform: translateY(-1px);
}

/* CHAT */
.chat {
  flex: 1;
  padding: 10px 16px 150px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  overflow-y: auto;
  scroll-behavior: smooth;
}

.chat::-webkit-scrollbar {
  width: 6px;
}

.chat::-webkit-scrollbar-track {
  background: transparent;
}

.chat::-webkit-scrollbar-thumb {
  background: rgba(139, 92, 246, 0.3);
  border-radius: 3px;
}

.chat::-webkit-scrollbar-thumb:hover {
  background: rgba(139, 92, 246, 0.5);
}

.message {
  max-width: 88%;
  padding: 14px 16px;
  border-radius: 18px;
  line-height: 1.55;
  font-size: 15px;
  animation: slideIn 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  backdrop-filter: blur(10px);
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateY(12px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.omi {
  align-self: flex-start;
  background: linear-gradient(135deg, rgba(32, 24, 50, 0.8), rgba(45, 37, 66, 0.6));
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
}

.user {
  align-self: flex-end;
  background: linear-gradient(135deg, #ff4d6d, #d946a6);
  border-bottom-right-radius: 4px;
  box-shadow: 0 8px 24px rgba(255, 77, 109, 0.2);
  color: white;
}

.message-name {
  font-size: 11px;
  color: var(--electric-blue);
  margin-bottom: 6px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.voice-row {
  margin-top: 10px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.speak-btn {
  border: 1px solid rgba(139, 92, 246, 0.3);
  background: rgba(139, 92, 246, 0.15);
  color: var(--electric-blue);
  border-radius: 10px;
  padding: 6px 12px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.3s ease;
  font-weight: 500;
  backdrop-filter: blur(10px);
}

.speak-btn:hover {
  background: rgba(139, 92, 246, 0.3);
  border-color: var(--purple);
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(139, 92, 246, 0.2);
}

.speak-btn:active {
  transform: scale(0.95);
}

/* INPUT */
.input-area {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: min(650px, 100%);
  padding: 12px 15px 16px;
  background: linear-gradient(to top, var(--bg) 0%, rgba(10, 8, 21, 0.8) 60%, transparent 100%);
  z-index: 20;
  backdrop-filter: blur(20px);
}

.input-box {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 10px;
  border-radius: 18px;
  border: 1px solid var(--border);
  background: linear-gradient(135deg, rgba(32, 24, 50, 0.6), rgba(45, 37, 66, 0.4));
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(20px);
}

#input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 15px;
  padding: 12px 10px;
  font-family: inherit;
}

#input::placeholder {
  color: rgba(168, 162, 184, 0.6);
}

.send, .mic {
  width: 40px;
  height: 40px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-size: 18px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.send {
  background: linear-gradient(135deg, #ff4d6d, #d946a6, #8b5cf6);
  background-size: 200% 200%;
  color: white;
  font-weight: 700;
  box-shadow: 0 8px 24px rgba(255, 77, 109, 0.3);
  animation: gradientShift 3s ease infinite;
}

.send:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 32px rgba(255, 77, 109, 0.4);
}

.send:active {
  transform: scale(0.95);
}

.mic {
  background: rgba(139, 92, 246, 0.15);
  color: var(--electric-blue);
  border: 1px solid var(--border);
  font-size: 20px;
}

.mic:hover {
  background: rgba(139, 92, 246, 0.25);
  transform: translateY(-2px);
  box-shadow: 0 8px 20px var(--glow-purple);
}

.mic:active {
  transform: scale(0.95);
}

/* MOBILE RESPONSIVE */
@media (max-width: 480px) {
  .hero h2 {
    font-size: 23px;
  }

  .robot {
    font-size: 60px;
  }

  .message {
    max-width: 90%;
    font-size: 14px;
  }

  .quick {
    grid-template-columns: 1fr 1fr;
  }

  .brand h1 {
    font-size: 18px;
    letter-spacing: 1px;
  }

  header {
    padding: 14px 16px 12px;
  }

  .input-area {
    padding: 10px 12px 14px;
  }

  .input-box {
    padding: 8px 8px;
  }

  #input {
    padding: 10px 8px;
    font-size: 14px;
  }

  .send, .mic {
    width: 38px;
    height: 38px;
  }
}

@media (max-width: 360px) {
  .message {
    max-width: 92%;
  }

  .logo {
    width: 44px;
    height: 44px;
    font-size: 20px;
  }

  .hero h2 {
    font-size: 21px;
  }

  .robot {
    font-size: 55px;
  }
}
</style>
</head>

<body>

<div class="app">

<header>
  <div class="brand">
    <div class="logo">OM</div>
    <div>
      <h1>OMVERSE</h1>
      <div class="status">● OMI is online</div>
    </div>
  </div>

  <div class="actions">
    <button class="icon-btn" onclick="toggleVoice()" title="Toggle sound">🔊</button>
    <button class="icon-btn" onclick="alert('Settings coming soon 😎')" title="Settings">⚙️</button>
  </div>
</header>

<section class="hero">
  <div class="robot">🤖</div>
  <h2>Oye bhai, aa gaya tu 😎</h2>
  <p>
    Main OMI hoon — tera AI dost, thoda savage,
    thoda smart aur kabhi-kabhi unnecessarily funny.
  </p>
</section>

<div class="quick">
  <button onclick="quickMessage('Mujhe roast kar bhai 🔥')">🔥<br>Roast Me</button>
  <button onclick="quickMessage('Mere saath koi game khel 😎')">🎮<br>Game</button>
  <button onclick="quickMessage('Mujhe smart help chahiye 🧠')">🧠<br>Smart Help</button>
  <button onclick="quickMessage('Mera timepass karwa 😂')">🎲<br>Timepass</button>
</div>

<main class="chat" id="chat">

  <div class="message omi">
    <div class="message-name">OMI 🤖</div>
    Oye bhai 😎 Swagat hai OMVERSE mein!<br><br>
    Bataa, normal baat karni hai, smart help chahiye ya OMI se roast karwana hai? 🔥

    <div class="voice-row">
      <button class="speak-btn" onclick="speakMessage(this)">🔊 Sunao</button>
    </div>
  </div>

</main>

<div class="input-area">
  <div class="input-box">
    <button class="mic" onclick="startVoice()" title="Voice input">🎙️</button>

    <input
      id="input"
      type="text"
      placeholder="OMI ko message bhejo..."
      onkeydown="if(event.key==='Enter') sendMessage()"
    >

    <button class="send" onclick="sendMessage()">➤</button>
  </div>
</div>

</div>

<script>

let voiceEnabled = true;
let currentSpeech = null;

/* SEND MESSAGE */
function sendMessage() {
  const input = document.getElementById("input");
  const text = input.value.trim();

  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  setTimeout(() => {
    const reply = generateReply(text);
    addMessage(reply, "omi");
  }, 700);
}

/* QUICK BUTTON */
function quickMessage(text) {
  document.getElementById("input").value = text;
  sendMessage();
}

/* ADD MESSAGE */
function addMessage(text, type) {
  const chat = document.getElementById("chat");
  const message = document.createElement("div");
  message.className = "message " + type;

  if (type === "omi") {
    message.innerHTML = `
      <div class="message-name">OMI 🤖</div>
      ${text}
      <div class="voice-row">
        <button class="speak-btn" onclick="speakMessage(this)">🔊 Sunao</button>
      </div>
    `;
  } else {
    message.textContent = text;
  }

  chat.appendChild(message);

  window.scrollTo({
    top: document.body.scrollHeight,
    behavior: "smooth"
  });
}

/* REPLY LOGIC */
function generateReply(text) {
  const t = text.toLowerCase();

  if (t.includes("haal") || t.includes("kaisa hai")) {
    return "Main ekdum mast bhai 😎 Tu bata, zindagi tujhe chala rahi hai ya tu zindagi ko?";
  }

  if (t.includes("roast")) {
    return "Bhai tujhe roast karna to easy mode hai 😂 Tu bas online aa ja, content khud chal ke aa jata hai 🔥";
  }

  if (t.includes("hello") || t.includes("hi") || t.includes("hii")) {
    return "Oye bhai 😎 Kya scene hai? Aaj normal baat karni hai ya thodi bakchodi allowed hai?";
  }

  if (t.includes("sad") || t.includes("dukhi")) {
    return "Arre bhai 🫂 kya hua? Bata mujhe. Main judge nahi karunga... zyada 😌";
  }

  if (t.includes("game")) {
    return "Chal bhai 🎮 ek game khelte hain. Tu choose kar: Truth, Dare ya rapid-fire?";
  }

  if (t.includes("help")) {
    return "Bol bhai 🧠 kis cheez me help chahiye? OMI duty pe hai.";
  }

  return "Hmm bhai 🤔 interesting... thoda aur bata, mujhe poora context de. Phir OMI apna dimaag lagata hai 😎";
}

/* SPEAK ONLY WHEN BUTTON IS PRESSED */
function speakMessage(button) {
  const message = button.closest(".message");
  let text = message.innerText;
  text = text.replace("OMI 🤖", "").replace("🔊 Sunao", "").trim();

  if ("speechSynthesis" in window) {
    speechSynthesis.cancel();

    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = "hi-IN";
    speech.rate = 0.92;
    speech.pitch = 1.03;
    speech.volume = 1;

    button.innerText = "⏹️ Stop";

    speech.onend = () => {
      button.innerText = "🔊 Sunao";
    };

    speechSynthesis.speak(speech);
  } else {
    alert("Is browser me voice support nahi hai 😅");
  }
}

/* HEADER VOICE BUTTON */
function toggleVoice() {
  if (speechSynthesis.speaking) {
    speechSynthesis.cancel();
    return;
  }

  const speech = new SpeechSynthesisUtterance("Oye bhai, OMI online hai 😎");
  speech.lang = "hi-IN";
  speech.rate = 0.92;
  speech.pitch = 1.03;

  speechSynthesis.speak(speech);
}

/* MICROPHONE */
function startVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    alert("Voice input is not supported in this browser 😅");
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = "hi-IN";
  recognition.interimResults = false;

  recognition.start();

  recognition.onresult = function (event) {
    const text = event.results[0][0].transcript;
    document.getElementById("input").value = text;
  };
}

/* STOP SPEECH WHEN PAGE CLOSES */
window.onbeforeunload = function () {
  if ("speechSynthesis" in window) {
    speechSynthesis.cancel();
  }
};

</script>

</body>
</html>
